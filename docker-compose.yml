services:
  db:
    image: postgres:16-alpine
    container_name: seguro_veiculos_db
    environment:
      POSTGRES_DB: seguro_veiculos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d seguro_veiculos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - seguro_veiculos_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: seguro_veiculos_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgpass_src:ro
    entrypoint: >
      /bin/sh -c "cp /pgpass_src /tmp/pgpass && chmod 600 /tmp/pgpass && /entrypoint.sh"
    restart: unless-stopped
    networks:
      - seguro_veiculos_network

  api:
    build:
      context: .
      dockerfile: src/SeguroVeiculos.API/Dockerfile
    container_name: seguro_veiculos_api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=seguro_veiculos;Username=postgres;Password=postgres"
      SeguradoExternoUrl: "https://69cc7bebddc3cabb7bd1381d.mockapi.io"
      AllowedOrigins: "http://localhost:5080"
    ports:
      - "5070:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - seguro_veiculos_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seguro_veiculos_frontend
    ports:
      - "5080:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - seguro_veiculos_network

volumes:
  pgdata:
    driver: local
  pgadmin_data:
    driver: local

networks:
  seguro_veiculos_network:
    driver: bridge